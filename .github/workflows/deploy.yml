name: Deploy to EKS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-west-2
        run: |
          aws configure set aws_access_key_id $AWS_ACCESS_KEY
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Chunk Test
        run: |
          docker build -t chunk_test:${{ github.sha }} ./services/chunk_test

      - name: Build Chunk Metrics
        run: |
          docker build -t chunk_metrics:${{ github.sha }} ./services/chunk_metrics

      - name: Build Chunk Worker
        run: |
          docker build -t chunk_worker:${{ github.sha }} ./services/chunk_worker

      - name: Ensure ECR repos exist
        run: |
          aws ecr describe-repositories --repository-names chunk_test || \
            aws ecr create-repository --repository-name chunk_test

          aws ecr describe-repositories --repository-names chunk_metrics || \
            aws ecr create-repository --repository-name chunk_metrics

          aws ecr describe-repositories --repository-names chunk_worker || \
            aws ecr create-repository --repository-name chunk_worker

      - name: Push Chunk Test to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag chunk_test:$IMAGE_TAG $ECR_REGISTRY/chunk_test:$IMAGE_TAG
          docker tag chunk_test:$IMAGE_TAG $ECR_REGISTRY/chunk_test:latest
          docker push $ECR_REGISTRY/chunk_test:$IMAGE_TAG
          docker push $ECR_REGISTRY/chunk_test:latest

      - name: Push Chunk Metrics to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag chunk_metrics:$IMAGE_TAG $ECR_REGISTRY/chunk_metrics:$IMAGE_TAG
          docker tag chunk_metrics:$IMAGE_TAG $ECR_REGISTRY/chunk_metrics:latest
          docker push $ECR_REGISTRY/chunk_metrics:$IMAGE_TAG
          docker push $ECR_REGISTRY/chunk_metrics:latest

      - name: Push Chunk Worker to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag chunk_worker:$IMAGE_TAG $ECR_REGISTRY/chunk_worker:$IMAGE_TAG
          docker tag chunk_worker:$IMAGE_TAG $ECR_REGISTRY/chunk_worker:latest
          docker push $ECR_REGISTRY/chunk_worker:$IMAGE_TAG
          docker push $ECR_REGISTRY/chunk_worker:latest

      - name: Deploy to EKS
        run: |
          aws eks update-kubeconfig --name capstone-cluster --region us-west-2
          kubectl apply -f .github/actions/k8s-deployment.yml